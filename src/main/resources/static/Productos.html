<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario | Abarrotera Pro</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/admin_style.css">
</head>

<body>

    <header class="admin-nav">
        <div class="nav-content">
            <div class="brand">
                <i class="ph-bold ph-storefront"></i>
                <span>Abarrotera<b>PRO</b></span>
            </div>
            <nav>
                <a href="Index.html" class="active">Graficas</a>
                <a href="Productos.html">Productos</a>
                <a href="lotes.html">Lotes & Caducidad</a>
                <a href="Ventas.html">Ventas</a>
            </nav>
            <div class="user-profile">
                <span>Admin</span>
                <i class="ph-fill ph-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <div>
                <h1>Gestión de Productos</h1>
            </div>
            <button class="btn-secondary" onclick="limpiarFormulario()">
                <i class="ph ph-plus"></i> Nuevo Registro
            </button>
        </div>

        <div class="admin-grid">
            <aside class="card">
                <h3 id="form-title">Registrar Producto</h3>
                <form id="form-producto" class="mt-20">
                    <input type="hidden" id="id_producto">

                    <div class="form-group">
                        <label for="nombre">Nombre del Producto</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej. Arroz Blanco 1kg" required>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="marca">Marca</label>
                            <input type="text" id="marca" class="form-control" placeholder="Ej. Verde Valle">
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoría</label>
                            <select id="categoria" class="form-control">
                                <option value="Abarrotes">Abarrotes</option>
                                <option value="Lácteos">Lácteos</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Limpieza">Limpieza</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="capacidad">Capacidad / Unidad</label>
                        <input type="text" id="capacidad" class="form-control" placeholder="Ej. 900ml / 1kg">
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="precio_compra">Costo (Compra)</label>
                            <input type="number" step="0.01" id="precio_compra" class="form-control" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="precio_venta">Precio Venta</label>
                            <input type="number" step="0.01" id="precio_venta" class="form-control highlight"
                                placeholder="0.00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción Breve</label>
                        <textarea id="descripcion" class="form-control" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="ph ph-floppy-disk"></i> Guardar Producto
                    </button>
                </form>
            </aside>

            <section class="card no-padding overflow-hidden">
                <div class="table-actions">
                    <div class="search-box">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Buscar producto...">
                    </div>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto / Marca</th>
                            <th>Categoría</th>
                            <th>Precio Venta</th>
                            <th class="text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                    </tbody>
                </table>
            </section>
        </div>


        <div id="modal-editar" class="modal-overlay" style="display: none;">
            <div class="modal-content card">
                <div class="modal-header">
                    <h3>Editar Producto</h3>
                    <button class="btn-close" onclick="cerrarModal()"><i class="ph ph-x"></i></button>
                </div>
                <form id="form-editar" class="mt-20">
                    <input type="hidden" id="edit_id_producto">

                    <div class="form-group">
                        <label for="edit_nombre">Nombre del Producto</label>
                        <input type="text" id="edit_nombre" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="edit_marca">Marca</label>
                            <input type="text" id="edit_marca" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="edit_categoria">Categoría</label>
                            <select id="edit_categoria" class="form-control">
                                <option value="Abarrotes">Abarrotes</option>
                                <option value="Lácteos">Lácteos</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Limpieza">Limpieza</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="edit_capacidad">Capacidad / Unidad</label>
                        <input type="text" id="edit_capacidad" class="form-control">
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="edit_precio_compra">Costo (Compra)</label>
                            <input type="number" step="0.01" id="edit_precio_compra" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="edit_precio_venta">Precio Venta</label>
                            <input type="number" step="0.01" id="edit_precio_venta" class="form-control highlight">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="edit_descripcion">Descripción Breve</label>
                        <textarea id="edit_descripcion" class="form-control" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="ph ph-floppy-disk"></i> Actualizar Producto
                    </button>
                </form>
            </div>
        </div>


    </main>

    <script src="js/productos.js"></script>
</body>

</html>
