<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario | Abarrotera Pro</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/admin_style.css">
</head>
<body>

    <header class="admin-nav">
        <div class="nav-content">
            <div class="brand">
                <i class="ph-bold ph-storefront"></i>
                <span>Abarrotera<b>PRO</b></span>
            </div>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="gestion_productos.html" class="active">Productos</a>
                <a href="lotes.html">Lotes & Caducidad</a>
                <a href="ventas.html">Punto de Venta</a>
            </nav>
            <div class="user-profile">
                <span>Admin</span>
                <i class="ph-fill ph-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <div>
                <h1>Gestión de Productos</h1>
                <p>Agrega, edita o elimina artículos del catálogo maestro.</p>
            </div>
            <button class="btn-secondary" onclick="limpiarFormulario()">
                <i class="ph ph-plus"></i> Nuevo Registro
            </button>
        </div>

        <div class="admin-grid">
            <aside class="card">
                <h3 id="form-title">Registrar Producto</h3>
                <form id="form-producto" class="mt-20">
                    <input type="hidden" id="id_producto">

                    <div class="form-group">
                        <label for="nombre">Nombre del Producto</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej. Arroz Blanco 1kg" required>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="marca">Marca</label>
                            <input type="text" id="marca" class="form-control" placeholder="Ej. Verde Valle">
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoría</label>
                            <select id="categoria" class="form-control">
                                <option value="Abarrotes">Abarrotes</option>
                                <option value="Lácteos">Lácteos</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Limpieza">Limpieza</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="capacidad">Capacidad / Unidad</label>
                        <input type="text" id="capacidad" class="form-control" placeholder="Ej. 900ml / 1kg">
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="precio_compra">Costo (Compra)</label>
                            <input type="number" step="0.01" id="precio_compra" class="form-control" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="precio_venta">Precio Venta</label>
                            <input type="number" step="0.01" id="precio_venta" class="form-control highlight" placeholder="0.00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción Breve</label>
                        <textarea id="descripcion" class="form-control" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="ph ph-floppy-disk"></i> Guardar Producto
                    </button>
                </form>
            </aside>

            <section class="card no-padding overflow-hidden">
                <div class="table-actions">
                    <div class="search-box">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Buscar producto...">
                    </div>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto / Marca</th>
                            <th>Categoría</th>
                            <th>Precio Venta</th>
                            <th class="text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        <tr>
                            <td>001</td>
                            <td>
                                <div class="prod-info">
                                    <span class="name">Leche Entera</span>
                                    <span class="brand">Lala - 1L</span>
                                </div>
                            </td>
                            <td>Lácteos</td>
                            <td><span class="badge-price">$26.50</span></td>
                            <td class="text-right">
                                <div class="action-btns">
                                    <button class="btn-action edit" onclick="editarProd(1)"><i class="ph ph-pencil-simple"></i></button>
                                    <button class="btn-action delete" onclick="eliminarProd(1)"><i class="ph ph-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="js/productos.js"></script>
</body>
</html>
